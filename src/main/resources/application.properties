# ===============================
# SERVER CONFIG
# ===============================
server.port=${PORT:8080}

# ===============================
# DATABASE CONFIG (MySQL LOCAL)
# ?? For deployment we will change later
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/flowbit?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=flowbitSuperSecretKeyForJwtAuthentication2026SecureKey
jwt.expiration=86400000